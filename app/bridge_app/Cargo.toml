[package]
name = "bridge_app"
version = "0.1.0"
edition = "2021"

[dependencies]
bridge = { path = "../../bridge/programs/bridge" }
anchor-client = { version = "0.32.1", features = ["async"] }
anchor-lang = "0.32.1"
anyhow = "1.0.93"
tokio = { version = "1.0", features = ["full"] }
anchor-spl = "0.32.1"
alloy = { version = "1.0.41", features = ["providers"] }
env = "1.0.1"
dotenv = "0.15.0"
tracing = "0.1"
tracing-subscriber = "0.3"
sea-orm = { version = "0.12", features = [
    "sqlx-postgres",
    "runtime-tokio-native-tls",
    "macros",
    "debug-print"
]}
solana-client = "3.1.9"
base64 = "0.22.1"
futures = "0.3.32"
solana-sdk = "4.0.1"
solana-rpc = "3.1.9"

